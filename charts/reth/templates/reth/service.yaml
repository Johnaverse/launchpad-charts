{{- $values := $.Values.reth }}
{{- $componentName := "reth"}}
{{- $componentLabel := include "reth.componentLabelFor" $componentName }}

apiVersion: v1
kind: Service
metadata:
  name: {{ include "reth.fullname" . }}-{{ $componentName }}-headless
  labels:
    {{- include "reth.labels" . | nindent 4 }}
    {{- $componentLabel | nindent 4 }}
spec:
  clusterIP: None # Headless service
  publishNotReadyAddresses: false
  ports:
    - port: {{ $values.rpc.port }}
      targetPort: http-jsonrpc
      protocol: TCP
      name: http-jsonrpc
    - port: {{ $values.ws.port }}
      targetPort: ws
      protocol: TCP
      name: ws
    - port: {{ $values.authrpc.port }}
      targetPort: http-engineapi
      protocol: TCP
      name: http-engineapi
    - port: {{ $values.metrics.port }}
      targetPort: http-metrics
      protocol: TCP
      name: http-metrics
    - port: {{ $values.p2p.port }}
      targetPort: p2p-tcp
      protocol: TCP
      name: p2p-tcp
    - port: {{ $values.p2p.port }}
      targetPort: p2p-udp
      protocol: UDP
      name: p2p-udp
  selector:
    {{- include "reth.selectorLabels" . | nindent 4 }}
    {{- $componentLabel | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "reth.fullname" . }}-{{ $componentName }}
  labels:
    {{- include "reth.labels" . | nindent 4 }}
    {{- $componentLabel | nindent 4 }}
spec:
  type: {{ $values.service.type }}
  {{- if $values.service.topologyAwareRouting.enabled }}
  trafficDistribution: PreferClose
  {{- end }}
  ports:
    {{- range $portName, $portNumber := $values.service.ports }}
    - port: {{ $portNumber }}
      targetPort: {{ $portName }}
      protocol: TCP
      name: {{ $portName }}
    {{- end }}
  selector:
    {{- include "reth.selectorLabels" . | nindent 4 }}
    {{- $componentLabel | nindent 4 }}
{{- if $values.p2pNodePort.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "reth.fullname" . }}-{{ $componentName }}-p2p-nodeport
  labels:
    {{- include "reth.labels" . | nindent 4 }}
    {{- $componentLabel | nindent 4 }}
spec:
  type: NodePort
  externalTrafficPolicy: Local
  ports:
    - port: {{ $values.p2p.port }}
      nodePort: {{ $values.p2pNodePort.port }}
      name: p2p-tcp
      protocol: TCP
    - port: {{ $values.p2p.port }}
      nodePort: {{ $values.p2pNodePort.port }}
      name: p2p-udp
      protocol: UDP
  selector:
    {{- include "reth.selectorLabels" . | nindent 4 }}
    {{- $componentLabel | nindent 4 }}
{{- end }}
