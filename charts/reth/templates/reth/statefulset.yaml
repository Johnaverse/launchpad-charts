{{- $values := $.Values.reth }}
{{- $componentName := "reth"}}
{{- $componentLabel := include "reth.componentLabelFor" $componentName }}

{{- $jwtEnabled := or $values.jwt.existingSecret.name $values.jwt.fromLiteral }}
{{- $jwtSecretName := default (print (include "reth.fullname" .) "-" $componentName "-jwt") $values.jwt.existingSecret.name }}
{{- $jwtSecretKey := default "jwt.hex" $values.jwt.existingSecret.key }}

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "reth.fullname" . }}-{{ $componentName }}
  labels:
    {{- include "reth.labels" . | nindent 4 }}
    {{- $componentLabel | nindent 4 }}
spec:
  serviceName: {{ include "reth.fullname" . }}-{{ $componentName }}-headless
  replicas: {{ include "reth.replicas" $values }}
  {{- if $values.updateStrategy }}
  updateStrategy:
    {{- toYaml $values.updateStrategy | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "reth.selectorLabels" . | nindent 6 }}
      {{- $componentLabel | nindent 6 }}
  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        {{- toYaml $values.volumeClaimSpec | nindent 8 }}
  template:
    metadata:
      {{- with $values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "reth.selectorLabels" . | nindent 8 }}
        {{- $componentLabel | nindent 8 }}
        {{- with $values.extraLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "reth.serviceAccountName" . }}
      {{- with $values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ $values.terminationGracePeriodSeconds | default "300" }}
      volumes:
        - name: tmp
          emptyDir: {}
      {{- if $jwtEnabled }}
        - name: jwt
          secret:
            secretName: {{ $jwtSecretName }}
            items:
              - key: {{ $jwtSecretKey }}
                path: jwt.hex
      {{- end }}
      {{- if $values.config }}
        - name: config
          configMap:
            name: {{ include "reth.fullname" . }}-{{ $componentName }}-config
      {{- end }}
      {{- if $values.p2pNodePort.enabled }}
        - name: env-nodeport
          emptyDir: {}
      {{- end }}
      initContainers:
        - name: set-permissions
          image: "{{ $values.initChownData.image.repository }}:{{ $values.initChownData.image.tag }}"
          imagePullPolicy: {{ $values.initChownData.image.pullPolicy }}
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
          command:
            - sh
            - -ac
            - |
              set -ex;
              if [ ! -f {{ $values.datadir }}/permissions_set ]; then
                chown -R 1000:1000 {{ $values.datadir }};
                chmod -R 750 {{ $values.datadir }};
                touch {{ $values.datadir }}/permissions_set
              else
                echo "Permissions already set, skipping"
              fi
          volumeMounts:
            - name: storage
              mountPath: {{ $values.datadir }}
      {{- if $values.p2pNodePort.enabled }}
        - name: init-nodeport
          image: "{{ $values.p2pNodePort.initContainer.image.repository }}:{{ $values.p2pNodePort.initContainer.image.tag }}"
          imagePullPolicy: {{ $values.p2pNodePort.initContainer.image.pullPolicy }}
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          command:
            - sh
            - -c
            - |
              set -ex;
              export EXTERNAL_PORT=$(kubectl get services {{ include "reth.fullname" . }}-{{ $componentName }}-p2p-nodeport -o jsonpath='{.spec.ports[0].nodePort}');
              export EXTERNAL_IP=$(kubectl get nodes "${NODE_NAME}" -o jsonpath='{.status.addresses[?(@.type=="ExternalIP")].address}');
              echo "EXTERNAL_PORT=$EXTERNAL_PORT" >  /env/init-nodeport;
              echo "EXTERNAL_IP=$EXTERNAL_IP"     >> /env/init-nodeport;
              cat /env/init-nodeport;
          volumeMounts:
            - name: env-nodeport
              mountPath: /env
      {{- end }}
      {{- with $values.extraInitContainers }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $componentName }}
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          securityContext:
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -ac
            - |
            {{- if $values.p2pNodePort.enabled }}
              . /env/init-nodeport;
            {{- end }}
              set -ex;
              exec reth node \
                --datadir={{ $values.datadir }} \
                --chain={{ $values.chain }} \
              {{- if $values.full }}
                --full \
              {{- end }}
              {{- if $values.rpc.enabled }}
                --http \
                --http.addr={{ $values.rpc.addr }} \
                --http.port={{ $values.rpc.port }} \
                --http.api={{ $values.rpc.api }} \
                --http.corsdomain="{{ $values.rpc.corsdomain }}" \
              {{- end }}
              {{- if $values.ws.enabled }}
                --ws \
                --ws.addr={{ $values.ws.addr }} \
                --ws.port={{ $values.ws.port }} \
                --ws.api={{ $values.ws.api }} \
                --ws.origins="{{ $values.ws.origins }}" \
              {{- end }}
              {{- if $jwtEnabled }}
                --authrpc.addr={{ $values.authrpc.addr }} \
                --authrpc.port={{ $values.authrpc.port }} \
                --authrpc.jwtsecret={{ $values.authrpc.jwtsecret }} \
              {{- end }}
              {{- if $values.metrics.enabled }}
                --metrics={{ $values.metrics.addr }}:{{ $values.metrics.port }} \
              {{- end }}
                --discovery.port={{ $values.p2p.port }} \
                --port={{ $values.p2p.port }} \
                --peers.max-outbound={{ $values.p2p.maxOutboundPeers }} \
                --peers.max-inbound={{ $values.p2p.maxInboundPeers }} \
              {{- if $values.p2pNodePort.enabled }}
                --nat=extip:$EXTERNAL_IP \
              {{- end }}
              {{- if $values.config }}
                --config=/config/reth.toml \
              {{- end }}
              {{- range $values.extraArgs }}
                {{ . }} \
              {{- end }}
                --log.stdout.format=json
          ports:
          {{- if $values.rpc.enabled }}
            - name: http-jsonrpc
              containerPort: {{ $values.rpc.port }}
              protocol: TCP
          {{- end }}
          {{- if $values.ws.enabled }}
            - name: ws
              containerPort: {{ $values.ws.port }}
              protocol: TCP
          {{- end }}
          {{- if $jwtEnabled }}
            - name: http-engineapi
              containerPort: {{ $values.authrpc.port }}
              protocol: TCP
          {{- end }}
          {{- if $values.metrics.enabled }}
            - name: http-metrics
              containerPort: {{ $values.metrics.port }}
              protocol: TCP
          {{- end }}
            - name: p2p-tcp
              containerPort: {{ $values.p2p.port }}
              protocol: TCP
            - name: p2p-udp
              containerPort: {{ $values.p2p.port }}
              protocol: UDP
          volumeMounts:
            - name: storage
              mountPath: {{ $values.datadir }}
            - name: tmp
              mountPath: /tmp
          {{- if $jwtEnabled }}
            - name: jwt
              mountPath: {{ $values.authrpc.jwtsecret }}
              subPath: jwt.hex
              readOnly: true
          {{- end }}
          {{- if $values.config }}
            - name: config
              mountPath: /config
              readOnly: true
          {{- end }}
          {{- if $values.p2pNodePort.enabled }}
            - name: env-nodeport
              mountPath: /env
          {{- end }}
          {{- with $values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if $values.readinessProbe }}
          readinessProbe:
            {{- toYaml $values.readinessProbe | nindent 12 }}
          {{- else if $values.rpc.enabled }}
          readinessProbe:
            tcpSocket:
              port: http-jsonrpc
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 3
          {{- end }}
          {{- if $values.livenessProbe }}
          livenessProbe:
            {{- toYaml $values.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if $values.startupProbe }}
          startupProbe:
            {{- toYaml $values.startupProbe | nindent 12 }}
          {{- end }}
      {{- with $values.extraContainers }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or $values.affinity $values.affinityPresets.antiAffinityByHostname }}
      affinity:
      {{- if $values.affinity }}
        {{- toYaml $values.affinity | nindent 8 }}
      {{- else if $values.affinityPresets.antiAffinityByHostname }}
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/instance
                    operator: In
                    values:
                      - {{ $.Release.Name }}
                  - key: app.kubernetes.io/component
                    operator: In
                    values:
                      - {{ $componentName }}
              topologyKey: kubernetes.io/hostname
      {{- end }}
      {{- end }}
      {{- with $values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- if $values.config }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "reth.fullname" . }}-{{ $componentName }}-config
  labels:
    {{- include "reth.labels" . | nindent 4 }}
    {{- $componentLabel | nindent 4 }}
data:
  reth.toml: |
{{ $values.config | indent 4 }}
{{- end }}
