{{- if .Values.grafana.dashboards }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "reth.fullname" . }}-dashboards
  labels:
    {{- include "reth.labels" . | nindent 4 }}
    {{ .Values.grafana.dashboardsConfigMapLabel }}: {{ .Values.grafana.dashboardsConfigMapLabelValue | quote }}
data:
{{ (.Files.Glob "dashboards/*").AsConfig | indent 2 }}
{{- end }}
