# Default values for reth.
# This is a YAML-formatted file.

nameOverride: ""
fullnameOverride: ""

image:
  # -- Image for Reth
  repository: ghcr.io/paradigmxyz/reth
  pullPolicy: IfNotPresent
  # -- Overrides the image tag
  # @default -- Chart.appVersion
  tag: ""

# -- Pull secrets required to fetch the Image
imagePullSecrets: []

serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

rbac:
  # -- Specifies whether RBAC resources are to be created
  create: true
  # -- Required ClusterRole rules
  # @default -- See `values.yaml`
  clusterRules:
     # Required to obtain the nodes external IP
    - apiGroups: [""]
      resources:
      - "nodes"
      verbs:
      - "get"
      - "list"
      - "watch"
  # -- Required ClusterRole rules
  # @default -- See `values.yaml`
  rules:
    # Required to get information about the serices nodePort.
    - apiGroups: [""]
      resources:
      - "services"
      verbs:
      - "get"
      - "list"
      - "watch"

prometheus:
  serviceMonitors:
    # -- Enable monitoring by creating `ServiceMonitor` CRDs ([prometheus-operator](https://github.com/prometheus-operator/prometheus-operator))
    enabled: false
    labels: {}
    interval:
    scrapeTimeout:
    relabelings: []

grafana:
  # -- Enable creation of Grafana dashboards. [Grafana chart](https://github.com/grafana/helm-charts/tree/main/charts/grafana#grafana-helm-chart) must be configured to search this namespace, see `sidecar.dashboards.searchNamespace`
  dashboards: false
  # -- Must match `sidecar.dashboards.label` value for the [Grafana chart](https://github.com/grafana/helm-charts/tree/main/charts/grafana#grafana-helm-chart)
  dashboardsConfigMapLabel: grafana_dashboard
  # -- Must match `sidecar.dashboards.labelValue` value for the [Grafana chart](https://github.com/grafana/helm-charts/tree/main/charts/grafana#grafana-helm-chart)
  dashboardsConfigMapLabelValue: "1"
  # -- Create GrafanaDashboard CRDs via Grafana Operator from files in `dashboards/`
  operatorDashboards:
    enabled: false
    # -- Optional target namespace for the GrafanaDashboard CRDs (defaults to release namespace)
    namespace: ""
    # -- Extra labels and annotations on the GrafanaDashboard resources
    labels: {}
    annotations: {}
    # -- Selector to match Grafana instances managed by the operator
    instanceSelector:
      matchLabels: {}
    # -- Allow matching Grafana instances outside current namespace
    allowCrossNamespaceImport: false
    # -- Optional folder metadata
    folder: ""
    folderUID: ""
    uid: ""
    # -- Operator sync behavior
    resyncPeriod: ""
    suspend: false
    # -- Additional spec fields to merge into GrafanaDashboard.spec
    extraSpec: {}

reth:
  # -- JWT for clients to authenticate with the Engine API. Specify either `existingSecret` OR `fromLiteral`.
  jwt:
    # -- Load the JWT from an existing Kubernetes Secret. Takes precedence over `fromLiteral` if set.
    existingSecret:
      # -- Name of the Secret resource in the same namespace
      name: null
      # -- Data key for the JWT in the Secret
      key: null
    # -- Use this literal value for the JWT
    fromLiteral: null

  # -- Additional CLI arguments to pass to `reth node`
  extraArgs: []

  # -- Extra labels to attach to the Pod for matching against
  extraLabels: {}

  # -- The path to the Reth data directory
  datadir: /data

  # -- Chain to sync (mainnet, sepolia, goerli, holesky, etc.)
  chain: mainnet

  # -- Enable full node (archive mode if false)
  full: true

  # -- RPC configuration
  rpc:
    # -- Enable HTTP RPC server
    enabled: true
    # -- HTTP RPC server listening address
    addr: "0.0.0.0"
    # -- HTTP RPC server listening port
    port: 8545
    # -- RPC API modules to enable (eth, net, web3, debug, trace, etc.)
    api: "eth,net,web3"
    # -- CORS origins to allow
    corsdomain: "*"

  # -- WebSocket configuration
  ws:
    # -- Enable WebSocket server
    enabled: true
    # -- WebSocket server listening address
    addr: "0.0.0.0"
    # -- WebSocket server listening port
    port: 8546
    # -- WebSocket API modules to enable
    api: "eth,net,web3"
    # -- WebSocket origins to allow
    origins: "*"

  # -- Engine API configuration (for consensus client)
  authrpc:
    # -- Engine API listening address
    addr: "0.0.0.0"
    # -- Engine API listening port
    port: 8551
    # -- JWT secret path
    jwtsecret: /data/jwt.hex

  # -- Metrics configuration
  metrics:
    # -- Enable metrics
    enabled: true
    # -- Metrics listening address
    addr: "0.0.0.0"
    # -- Metrics listening port
    port: 9001

  # -- P2P networking configuration
  p2p:
    # -- P2P listening port
    port: 30303
    # -- Maximum number of outbound peers
    maxOutboundPeers: 100
    # -- Maximum number of inbound peers
    maxInboundPeers: 30

  # -- Custom reth.toml configuration
  # Will be mounted as a ConfigMap at /config/reth.toml
  # See https://reth.rs/run/configuration/ for all options
  config: ""
  # config: |
  #   [peers]
  #   max_outbound = 100
  #   max_inbound = 30
  #
  #   [stages.headers]
  #   downloader_max_concurrent_requests = 100

  # -- [PersistentVolumeClaimSpec](https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.23/#persistentvolumeclaimspec-v1-core) for Reth storage
  volumeClaimSpec:
    accessModes: ["ReadWriteOnce"]
    # -- The storage class to use when provisioning a persistent volume for Reth
    storageClassName: 
    resources:
      requests:
        # -- The amount of disk space to provision for Reth
        storage: 2Ti

  # Increasing the grace termination period prevents Kubernetes
  # from killing the node process prematurely. Premature shutdown
  # can lead to data integrity issues
  # -- Amount of time to wait before force-killing the Reth process
  terminationGracePeriodSeconds: 300

  # -- Annotations for the `Pod`
  podAnnotations: {}

  # -- Pod-wide security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  service:
    topologyAwareRouting:
      # -- Toggle for topology aware routing
      enabled: false
    type: ClusterIP
    ports:
      # Valid keys are names of ports that are exposed by the Pod (see templates/reth/statefulset.yaml)
      # -- Service Port to expose JSON-RPC interface on
      http-jsonrpc: 8545
      # -- Service Port to expose WebSocket interface on
      ws: 8546
      # -- Service Port to expose Engine API interface on
      http-engineapi: 8551
      # -- Service Port to expose Prometheus metrics on
      http-metrics: 9001

  resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    #   ephemeral-storage: 100Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi
    #   ephemeral-storage: 100Mi

  nodeSelector: {}

  tolerations: []

  affinityPresets:
    # -- Configure anti-affinity rules to prevent multiple Reth instances on the same host
    antiAffinityByHostname: true

  affinity: {}

  # P2P configuration (for exposing P2P port externally)
  p2pNodePort:
    # -- Expose P2P port via NodePort
    enabled: false
    # -- NodePort to be used. Must be unique.
    port: 31000
    initContainer:
      image:
        # -- Container image to fetch nodeport information
        repository: lachlanevenson/k8s-kubectl
        # -- Container tag
        tag: v1.25.4
        # -- Container pull policy
        pullPolicy: IfNotPresent

  # -- Additional init containers
  extraInitContainers: []
  # -- Additional containers
  extraContainers: []
